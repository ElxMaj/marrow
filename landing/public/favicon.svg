<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- the marrow, lit inside the black room: one warm gold bead on near-black,
       the same gold dot the wordmark uses, given depth for the app mark -->
