    <radialGradient id="marrow" cx="0.4" cy="0.34" r="0.72">
      <stop stop-color="#f2dcaa" />
      <stop offset="0.55" stop-color="#dcab5b" />
      <stop offset="1" stop-color="#c1893a" />
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#0a0b0d" />
  <circle cx="16" cy="16" r="7" fill="url(#marrow)" />
</svg>
