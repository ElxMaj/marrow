services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: marrow
      POSTGRES_PASSWORD: marrow
      POSTGRES_DB: marrow
    ports:
      - "5432:5432"
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marrow"]
      interval: 5s
      timeout: 3s
      retries: 10
