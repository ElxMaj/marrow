name: release
# publishes ONLY on a tagged release (v*), never on a normal merge. publishing
# requires an NPM_TOKEN repo secret with publish rights. see docs/release.md.
on:
  push:
    tags: ["v*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    # the same DB-backed suite as ci.yml runs here before publish, so it needs
    # the same pgvector Postgres service. without it, migrate and every
    # database test fail and the release never reaches changeset publish.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: marrow
          POSTGRES_PASSWORD: marrow
          POSTGRES_DB: marrow
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U marrow"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://marrow:marrow@localhost:5432/marrow
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Verify npm token
        run: test -n "$NODE_AUTH_TOKEN"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: pnpm db:migrate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm smoke:packed
      - run: pnpm -r build
      - run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
