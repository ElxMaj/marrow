name: Bug report
description: Report something in Marrow that behaves differently than you expected.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Marrow's only infrastructure is one Postgres with the pgvector extension, so the fields below help us reproduce your setup quickly. Please fill in as much as you can.
  - type: checkboxes
    id: search
    attributes:
      label: Existing issues
      description: Please confirm you have looked for a matching report before opening a new one.
      options:
        - label: I searched the existing issues and did not find a duplicate.
          required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the actual behavior, and what you expected instead.
      placeholder: |
        What I saw:
        What I expected:
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact commands or actions, in order, that trigger the bug.
      placeholder: |
        1. Run `marrow migrate`
        2. Run `marrow ingest ./notes`
        3. ...
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Output of `marrow doctor`
      description: This is the first triage step. Paste the full output (or `marrow doctor --json`). It checks DATABASE_URL, Postgres reachability, schema migration, and model readiness.
      render: text
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Which surface
      description: Where did the bug show up?
      options:
        - CLI
        - MCP server
        - web console
        - core library
        - docs
    validations:
      required: true
  - type: input
    id: postgres
    attributes:
      label: Postgres version and pgvector
      description: Which Postgres version you are on, and whether the pgvector extension is installed.
      placeholder: "Postgres 17, pgvector installed"
    validations:
      required: true
  - type: dropdown
    id: model
    attributes:
      label: Model configuration
      description: Is a model key configured (MARROW_API_KEY or MARROW_PROVIDER), or are you running in keyless mode? Reads and ingestion work keyless; distillation needs a model.
      options:
        - Model key configured (MARROW_API_KEY, Claude)
        - Local provider configured (MARROW_PROVIDER)
        - Keyless mode (no model configured)
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Logs, screenshots, OS, Node version, or other context. Optional.
    validations:
      required: false
